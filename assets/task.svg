<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="task-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#task-bg)" />
  
  <!-- Kanban Columns -->
  <!-- Column 1: TODO -->
  <rect x="40" y="40" width="90" height="240" rx="6" fill="#334155" opacity="0.3" />
  <rect x="50" y="50" width="40" height="8" rx="2" fill="#94a3b8" />
  
  <!-- Card 1 -->
  <rect x="50" y="70" width="70" height="60" rx="4" fill="#475569" />
  <rect x="60" y="80" width="50" height="6" rx="2" fill="#cbd5e1" />
  <rect x="60" y="95" width="30" height="4" rx="2" fill="#94a3b8" />
  <circle cx="105" cy="115" r="8" fill="#38bdf8" />
  
  <!-- Card 2 -->
  <rect x="50" y="140" width="70" height="50" rx="4" fill="#475569" />
  <rect x="60" y="150" width="40" height="6" rx="2" fill="#cbd5e1" />
  
  <!-- Column 2: IN PROGRESS -->
  <rect x="150" y="40" width="90" height="240" rx="6" fill="#334155" opacity="0.3" />
  <rect x="160" y="50" width="60" height="8" rx="2" fill="#38bdf8" />
  
  <!-- Card 3 -->
  <rect x="160" y="70" width="70" height="80" rx="4" fill="#475569" stroke="#38bdf8" stroke-width="1" />
  <rect x="170" y="80" width="50" height="6" rx="2" fill="#cbd5e1" />
  <rect x="170" y="95" width="40" height="4" rx="2" fill="#94a3b8" />
  <rect x="170" y="105" width="30" height="4" rx="2" fill="#94a3b8" />
  <circle cx="215" cy="135" r="8" fill="#a78bfa" />

  <!-- Column 3: DONE -->
  <rect x="260" y="40" width="90" height="240" rx="6" fill="#334155" opacity="0.3" />
  <rect x="270" y="50" width="30" height="8" rx="2" fill="#34d399" />
  
  <!-- Card 4 -->
  <rect x="270" y="70" width="70" height="50" rx="4" fill="#475569" opacity="0.7" />
  <rect x="280" y="80" width="40" height="6" rx="2" fill="#94a3b8" />
