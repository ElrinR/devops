<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg-grad)" />
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="80" height="300" fill="#334155" opacity="0.5" />
  <circle cx="40" cy="40" r="15" fill="#38bdf8" />
  <rect x="25" y="80" width="30" height="5" rx="2" fill="#94a3b8" />
  <rect x="25" y="100" width="30" height="5" rx="2" fill="#94a3b8" />
  <rect x="25" y="120" width="30" height="5" rx="2" fill="#94a3b8" />
  
  <!-- Header -->
  <rect x="100" y="20" width="280" height="40" rx="4" fill="#334155" opacity="0.3" />
  
  <!-- Chart Area -->
  <rect x="100" y="80" width="180" height="120" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <path d="M120 170 L140 150 L160 160 L180 130 L200 140 L220 100" fill="none" stroke="#38bdf8" stroke-width="3" />
  <circle cx="120" cy="170" r="3" fill="#38bdf8" />
  <circle cx="140" cy="150" r="3" fill="#38bdf8" />
  <circle cx="160" cy="160" r="3" fill="#38bdf8" />
  <circle cx="180" cy="130" r="3" fill="#38bdf8" />
  <circle cx="200" cy="140" r="3" fill="#38bdf8" />
  <circle cx="220" cy="100" r="3" fill="#38bdf8" />
  
  <!-- Stats Cards -->
  <rect x="300" y="80" width="80" height="50" rx="4" fill="#1e293b" stroke="#334155" />
  <rect x="300" y="150" width="80" height="50" rx="4" fill="#1e293b" stroke="#334155" />
  
  <!-- Product List -->
  <rect x="100" y="220" width="280" height="60" rx="4" fill="#1e293b" stroke="#334155" />
  <rect x="110" y="235" width="30" height="30" rx="2" fill="#475569" />
  <rect x="150" y="240" width="100" height="8" rx="2" fill="#94a3b8" />
  <rect x="150" y="255" width="60" height="8" rx="2" fill="#475569" />
</svg>
