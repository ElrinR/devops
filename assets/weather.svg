<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="weather-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0f172a" />
  
  <!-- Phone Frame -->
  <rect x="120" y="20" width="160" height="260" rx="20" fill="url(#weather-bg)" />
  
  <!-- Weather Icon (Sun/Cloud) -->
  <circle cx="160" cy="100" r="25" fill="#fde047" opacity="0.9" />
  <path d="M150 110 Q150 95 170 95 Q185 95 190 105 Q205 105 205 120 Q205 135 190 135 L150 135 Q135 135 135 120 Q135 110 150 110" fill="#ffffff" opacity="0.8" />
  
  <!-- Temperature -->
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="40" fill="white" font-weight="bold" text-anchor="middle">24°</text>
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Sunny</text>
  
  <!-- Forecast List -->
  <rect x="135" y="220" width="130" height="30" rx="10" fill="rgba(255,255,255,0.2)" />
  <circle cx="150" cy="235" r="5" fill="#fde047" />
  <circle cx="175" cy="235" r="5" fill="#fde047" />
  <circle cx="200" cy="235" r="5" fill="#ffffff" opacity="0.7" />
  <circle cx="225" cy="235" r="5" fill="#94a3b8" />
</svg>
